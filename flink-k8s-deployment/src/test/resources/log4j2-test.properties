rootLogger.level = ERROR
rootLogger.appenderRef.console.ref = Console

appender.console.name = Console
appender.console.type = CONSOLE
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss,SSS} %-5p %-60c %x - %m%n

# Suppress noisy Flink internals
logger.flink.name = org.apache.flink
logger.flink.level = ERROR

logger.kafka.name = org.apache.kafka
logger.kafka.level = ERROR

logger.testcontainers.name = org.testcontainers
logger.testcontainers.level = ERROR

logger.workshop.name = com.xebia.flink.workshop
logger.workshop.level = INFO