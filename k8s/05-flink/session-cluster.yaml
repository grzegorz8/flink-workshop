---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink
  namespace: flink
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
      - pods
      - services
    verbs:
      - "*"
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - "*"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink-session-cluster
  namespace: flink
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-session-cluster
  namespace: flink
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink
subjects:
  - kind: ServiceAccount
    name: flink-session-cluster
    namespace: flink
---
apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: flink-session-cluster
  namespace: flink
spec:
  flinkVersion: v2_0
  image: flink:2.0.1-scala_2.12-java17
  imagePullPolicy: IfNotPresent
  serviceAccount: flink-session-cluster
  jobManager:
    replicas: 1
    resource:
      cpu: 0.8
      memory: 1024m
  taskManager:
    replicas: 4
    resource:
      cpu: 1.0
      memory: 1536m
  podTemplate:
    apiVersion: v1
    kind: Pod
    metadata:
      name: flink-session-cluster-pod-template
    spec:
      containers:
        - name: flink-main-container
          ports:
            - containerPort: 9249
              name: metrics
          env:
            - name: ENABLE_BUILT_IN_PLUGINS
              value: "flink-s3-fs-presto-2.0.1.jar"
            - name: AWS_JAVA_V1_DISABLE_DEPRECATION_ANNOUNCEMENT
              value: "true"
  flinkConfiguration:
    execution.checkpointing.dir: "s3://flink/session-cluster/checkpoints/"
    execution.checkpointing.interval: 60s
    execution.checkpointing.savepoint-dir: "s3://flink/session-cluster/savepoints/"
    high-availability.storageDir: "s3://flink/session-cluster/high-availability/"
    high-availability.type: kubernetes
    kubernetes.rest-service.exposed.type: LoadBalancer
    metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
    restart-strategy.type: none
    s3.access-key: admin
    s3.endpoint: http://minio.s3.svc.cluster.local:9000
    s3.path.style.access: true
    s3.secret-key: Ov0WUUSuQ6
    state.backend.type: hashmap
    taskmanager.numberOfTaskSlots: "1"
    web.cancel.enable: "true"
    web.submit.enable: "true"
